name: Android Build & Test

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]  # Trigger release on version tags
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  ANDROID_SDK_ROOT: ${{ runner.temp }}/android-sdk
  GRADLE_OPTS: "-Xmx2g -XX:MaxPermSize=2048m -XX:+UseG1GC"

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # TEST JOB: Run unit tests
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: "Test: Unit Tests & Lint"
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

    - name: Setup Android SDK
      run: |
        mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>/dev/null || true

    - name: Run unit tests
      run: ./gradlew test --stacktrace

    - name: Upload test reports (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: test-reports
        path: app/build/reports/tests/


  # ─────────────────────────────────────────────────────────────────────────
  # BUILD JOB: Build release APK
  # Depends on: test job
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: "Build: Release APK"
    runs-on: ubuntu-latest
    needs: test
    if: always()  # Run even if test fails to see build errors

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Make gradlew executable
      run: chmod +x ./gradlew

    - name: Create local.properties
      run: echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties

    - name: Setup Android SDK
      run: |
        mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
        yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools" 2>/dev/null || true

    - name: Build release APK (unsigned)
      if: github.event_name != 'push' || github.ref_type != 'tag'
      run: ./gradlew assembleRelease

    - name: Build release APK (signed)
      if: github.event_name == 'push' && github.ref_type == 'tag' && secrets.SIGNING_KEYSTORE_BASE64 != ''
      env:
        SIGNING_KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
        SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
        SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
      run: |
        echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > ${{ runner.temp }}/release.keystore
        ./gradlew assembleRelease

    - name: Upload release APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: release-apk
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 30

    - name: Upload build reports (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-reports
        path: |
          app/build/reports/
          
  # ─────────────────────────────────────────────────────────────────────────
  # RELEASE JOB: Create GitHub Release with APK
  # Runs only on version tags (v*.*.*)
  # Depends on: build job
  # ─────────────────────────────────────────────────────────────────────────
  release:
    name: "Release: Create GitHub Release"
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') && needs.build.result == 'success'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download release APK
      uses: actions/download-artifact@v4
      with:
        name: release-apk
        path: ./artifacts

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: ./artifacts/app-release.apk
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
